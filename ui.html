<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #fff;
      color: #333;
      padding: 12px;
      user-select: none;
    }
    h2 {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin: 0 0 8px 0;
    }
    .section { margin-bottom: 18px; }

    .user-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .user-btn {
      border: 2px solid #eee;
      border-radius: 8px;
      padding: 8px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      background: #f9f9f9;
      transition: all 0.15s;
    }
    .user-btn:hover { background: #f0f0f0; }
    .user-btn.active { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .user-dot { width: 20px; height: 20px; border-radius: 50%; }
    .user-name { font-size: 10px; font-weight: 600; text-align: center; }

    .btn-row { display: flex; gap: 6px; }
    .item-btn {
      flex: 1;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      background: #fff;
      padding: 8px 4px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .item-btn:hover { background: #f5f5f5; border-color: #ccc; transform: translateY(-1px); }
    .item-btn:active { transform: translateY(0); }
    .item-btn img { width: 40px; height: 40px; object-fit: contain; }
    .item-btn span { font-size: 10px; font-weight: 600; color: #444; }

    .who-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .who-header h2 { margin-bottom: 0; }
    .identity-chip {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      background: #eee;
      color: #aaa;
      transition: all 0.2s;
    }
    .item-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="section">
    <div class="who-header">
      <h2>你是誰？</h2>
      <div id="identityChip" class="identity-chip">尚未選擇</div>
    </div>
    <div class="user-grid" id="userGrid"></div>
  </div>

  <div class="section">
    <h2>Quick Stickers</h2>
    <div class="btn-row" id="stickerRow"></div>
  </div>

  <div class="section">
    <h2>Comment Boxes</h2>
    <div class="btn-row" id="commentRow"></div>
  </div>

    const STICKERS = [
      { key: 'plus1',  label: '+1' },
      { key: 'love',   label: 'Love' },
      { key: 'ok',     label: 'OK' }
    ];

    const COMMENTS = [
      { key: 'agree',   label: '同意' },
      { key: 'clarify', label: '待釐清' },
      { key: 'idea',    label: '點子' },
      { key: 'warn',    label: '不建議' }
    ];

    const users = [
      { id: 1, name: '拉瓦',  color: '#FF6B6B' },
      { id: 2, name: '天天',  color: '#FFD93D' },
      { id: 3, name: '之一',  color: '#6BCB77' },
      { id: 4, name: 'Iris',  color: '#4D96FF' },
      { id: 5, name: '李郁',  color: '#9D65C9' },
      { id: 6, name: '亨利',  color: '#FF9F45' },
      { id: 7, name: 'Josie', color: '#D63075' },
      { id: 8, name: '祈勳',  color: '#10A19D' },
      { id: 9, name: '岱虹',  color: '#8B5A2B' }
    ];

    let currentUser = null;

    function imgSrc(key) {
      return 'data:image/png;base64,' + IMAGES[key];
    }

    function getBytes(key) {
      const b64 = IMAGES[key];
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return Array.from(bytes);
    }

    function renderUsers() {
      const grid = document.getElementById('userGrid');
      grid.innerHTML = '';
      users.forEach(u => {
        const btn = document.createElement('div');
        const isActive = currentUser?.id === u.id;
        btn.className = 'user-btn' + (isActive ? ' active' : '');
        btn.style.borderColor = isActive ? u.color : '#eee';
        btn.innerHTML = `
          <div class="user-dot" style="background:${u.color}"></div>
          <div class="user-name" style="color:${isActive ? u.color : '#666'}">${u.name}</div>
        `;
        btn.onclick = () => selectUser(u);
        grid.appendChild(btn);
      });
    }

    function renderButtons() {
      const sr = document.getElementById('stickerRow');
      sr.innerHTML = '';
      STICKERS.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'item-btn';
        btn.innerHTML = `<img src="${imgSrc(s.key)}"><span>${s.label}</span>`;
        btn.onclick = () => createSticker(s.key, s.label);
        sr.appendChild(btn);
      });

      const cr = document.getElementById('commentRow');
      cr.innerHTML = '';
      COMMENTS.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'item-btn';
        btn.innerHTML = `<img src="${imgSrc(c.key)}"><span>${c.label}</span>`;
        btn.onclick = () => createComment(c.key, c.label);
        cr.appendChild(btn);
      });
    }

    function selectUser(user) {
      currentUser = user;
      renderUsers();
      const chip = document.getElementById('identityChip');
      chip.textContent = user.name;
      chip.style.background = user.color;
      chip.style.color = 'white';
      tryEnableButtons();
    }

    function createSticker(key, label) {
      if (!currentUser) { alert('請先選擇你的名字！'); return; }
      parent.postMessage({
        pluginMessage: { type: 'create-sticker', imageData: getBytes(key), label, user: currentUser }
      }, '*');
    }

    function createComment(key, label) {
      if (!currentUser) { alert('請先選擇你的名字！'); return; }
      parent.postMessage({
        pluginMessage: { type: 'create-comment', imageData: getBytes(key), label, user: currentUser }
      }, '*');
    }

    let fontsReady = false;

    function setButtonsEnabled(enabled) {
      document.querySelectorAll('.item-btn').forEach(btn => { btn.disabled = !enabled; });
    }

    function tryEnableButtons() {
      if (fontsReady && currentUser) setButtonsEnabled(true);
    }

    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg?.type === 'ready') {
        fontsReady = true;
        tryEnableButtons();
      }
    };

    renderUsers();
    renderButtons();
    setButtonsEnabled(false);
  </script>
</body>
